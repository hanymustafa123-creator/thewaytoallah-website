<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Arabic Dialogue Quiz (Non‑Native) | The Way To Allah Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a1c3a;
            background-image: 
                repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.04) 0px, rgba(212, 175, 55, 0.04) 2px, transparent 2px, transparent 10px),
                repeating-linear-gradient(135deg, rgba(212, 175, 55, 0.04) 0px, rgba(212, 175, 55, 0.04) 2px, transparent 2px, transparent 10px);
            font-family: 'Inter', 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 40px 24px;
            min-height: 100vh;
        }

        .floating-timer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 28, 58, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 12px;

            font-size: 20px;
            color: #d4af37;
        }
        .floating-timer .timer-display {
            font-size: 1.6rem;
            font-weight: 700;
            background: #0f2e1a;
            padding: 2px 12px;
            border-radius: 40px;
            color: #c8f0d1;
            letter-spacing: 2px;
        }
        .floating-timer .timer-btn {
            background: #d4af37;
            border: none;
            color: #0a1c3a;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;

        .quiz-wrapper {
            max-width: 1100px;
            margin: 0 auto;
        }

        .quiz-container {
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.35);
            overflow: hidden;
        }

        .dark-header {
            background: #0a1c3a;
            padding: 28px 32px;
            text-align: center;
            border-bottom: 4px solid #d4af37;
        }

        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4af37;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);

        .academy-name h1 {
            font-size: 2rem;

            color: #ffffff;
            letter-spacing: -0.5px;

        }

        .student-bar {
            background: #f8f9fc;
            padding: 18px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .student-field {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .student-field label {
            font-weight: 600;
            color: #0a1c3a;
        }
        .student-field input {
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid #d4af37;
            background: white;
            width: 220px;
            font-size: 0.95rem;
        }
        .btn {
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;

        .btn-emerald {

        }
        .active-badge {
            background: #eef2ff;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;

        }

        .start-area {
            text-align: center;
            padding: 50px 20px;
            background: #ffffff;
        }
        .start-btn {
            background: #2d6a4f;

            font-size: 1.5rem;
            padding: 16px 48px;
            box-shadow: 0 8px 20px rgba(45,106,79,0.3);

        }

            background: #1f543d;

        .quiz-content {
            display: none;
            padding: 28px;
        }

        .questions-grid {
            display: flex;

            gap: 28px;

        }
        .question-card {
            background: #ffffff;
            border-radius: 32px;

        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 12px 18px;
            border-radius: 28px;

            direction: ltr;
            text-align: left;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #fefefc;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            transition: 0.1s;
            flex-direction: row;
            justify-content: flex-start;
        }
        .option:hover {
            background: #f1f5f9;
            border-color: #d4af37;
        }
        .option.disabled {
            opacity: 0.7;
            cursor: default;
            background: #f1f5f9;
        }
        .option label {
            cursor: pointer;
            width: 100%;
            text-align: left;
            font-size: 1rem;
        }
        input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #2d6a4f;
            margin-right: 10px;
        }
        .feedback-inline {
            margin-top: 16px;
            padding: 10px 16px;
            border-radius: 28px;
            font-size: 0.85rem;
            display: none;
            background: #fef8e7;
            border-left: 4px solid #d4af37;
            color: #0a1c3a;
            text-align: left;
        }
        .feedback-inline.show {
            display: block;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
        }
        .score-area {
            background: #0a1c3a;
            padding: 10px 24px;
            border-radius: 60px;
            color: #d4af37;
            font-weight: 600;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-card {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            border-top: 6px solid #d4af37;
        }
        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }
        .btn-email {
            background: #2d6a4f;
            color: white;
        }
        .btn-wa {
            background: #25D366;
            color: white;
        }
        .btn-close {
            background: #64748b;
            color: white;
        }

        @media (max-width: 700px) {
            body { padding: 20px 16px; }
            .dark-header { padding: 20px; }
            .quiz-title { font-size: 1rem; }
            .floating-timer .timer-display { font-size: 1.2rem; padding: 2px 8px; }
            .question-text { font-size: 1rem; }
            .quiz-content { padding: 16px; }
            .start-btn { font-size: 1.2rem; padding: 12px 28px; }
            .logo-img { width: 100px; height: 100px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="floating-timer" id="floatingTimer">
    <span class="timer-icon">⏳</span>
    <span class="timer-display" id="floatTimerDisplay">05:00</span>
    <button class="timer-btn" id="floatPauseBtn" disabled>⏸️</button>
    <button class="timer-btn" id="floatResumeBtn" disabled>▶️</button>
</div>

<div class="quiz-wrapper">
    <div class="quiz-container">
        <div class="dark-header">
            <div class="logo-wrapper">
                <img class="logo-img" src="https://i.postimg.cc/JhTgDTqH/logo-jpeg.jpg" alt="Academy Logo">
            </div>
            <div class="academy-name">
                <h1>The Way To Allah Academy</h1>
            </div>
            <div class="quiz-title">🗣️ Arabic Dialogue Quiz (Exercises 3 & 4) 🗣️</div>
        </div>

        <div class="student-bar">
            <div class="student-field">
                <label>👤 Student Name</label>

<!-- Share modal only (certificate removed) -->
<div id="choiceModal" class="modal-overlay">

        <h3>📬 Share Your Results</h3>
        <p>You must send your mistakes to the teacher to complete the quiz.</p>
        <div class="modal-buttons">
            <button id="emailChoiceBtn" class="btn btn-email">📧 Send via Email</button>
            <button id="whatsappChoiceBtn" class="btn btn-wa">💬 Send via WhatsApp</button>
        </div>
    </div>
</div>

<div id="notificationModal" class="modal-overlay">
    <div class="modal-card">
        <p id="notificationMessage">Message</p>
        <button id="closeNotificationBtn" class="btn btn-close">OK</button>
    </div>
</div>

<script>
    const TEACHER_EMAIL = "hanishahin123@outlook.com";
    const TEACHER_WHATSAPP = "201200342973";
    const COURSE_NAME = "Arabic Dialogue Quiz (Exercises 3 & 4)";

    const QUESTIONS = [
        { 
            text: "1️⃣ What is the correct Arabic question word to ask about a person's identity?",
            options: ["مَنْ (Who?)", "مَا (What?)", "أَيْنَ (Where?)", "كَيْفَ (How?)"], 
            correct: "مَنْ (Who?)", 
            explanation: "We use مَنْ (man) to ask about a person. Example: مَنْ هَذَا؟ (Who is this?)" 
        },
        { 
            text: "2️⃣ In the dialogue example, Adnan is introduced as an engineer. How do you say 'He is an engineer' in Arabic?",
            options: ["هُوَ طَالِبٌ (student)", "هُوَ مُهَنْدِسٌ (engineer)", "هُوَ طَبِيبٌ (doctor)", "هُوَ مُعَلِّمٌ (teacher)"], 
            correct: "هُوَ مُهَنْدِسٌ (engineer)", 
            explanation: "مُهَنْدِسٌ (muhandis) means 'engineer'." 
        },
        { 
            text: "3️⃣ In Exercise (3), what is the profession of 'عَلِي'?",
            options: ["طَالِبٌ (student)", "مُعَلِّمٌ (teacher)", "مُهَنْدِسٌ (engineer)", "طَبِيبٌ (doctor)"], 
            correct: "مُعَلِّمٌ (teacher)", 
            explanation: "The text says: صَدِيقٌ عَلِي - مُعَلِّمٌ (Friend Ali – teacher)." 
        },
        { 
            text: "4️⃣ In Exercise (3), 'صَالِحٌ' is a student. Which Arabic word means 'student'?",
            options: ["طَبِيبٌ (doctor)", "مُعَلِّمٌ (teacher)", "طَالِبٌ (student)", "مُهَنْدِسٌ (engineer)"], 
            correct: "طَالِبٌ (student)", 
            explanation: "طَالِبٌ (talib) means 'student'." 
        },
        { 
            text: "5️⃣ In Exercise (3), 'سَالِمٌ' is a doctor. How do you say 'doctor' in Arabic?",
            options: ["مُهَنْدِسٌ (engineer)", "مُعَلِّمٌ (teacher)", "طَالِبٌ (student)", "طَبِيبٌ (doctor)"], 
            correct: "طَبِيبٌ (doctor)", 
            explanation: "طَبِيبٌ (tabib) means 'doctor'." 
        },
        { 
            text: "6️⃣ What does changing the ending in Arabic from 'وَالِدِي' (my father) to 'وَالِدُهُ' (his father) indicate?",
            options: ["Referring to my own father", "Referring to someone else's father", "Referring to a female's father", "Referring to a group's father"], 
            correct: "Referring to someone else's father", 
            explanation: "The suffix ـهُ (‑hu) means 'his' (singular masculine)." 
        },
        { 
            text: "7️⃣ How do you change 'هَذَا وَلَدِي' (This is my son) to 'This is his son'?",
            options: ["هَذَا وَلَدُهُ", "هَذَا وَلَدُهَا", "هَذَا وَلَدُكُمْ", "هَذَا وَلَدُنَا"], 
            correct: "هَذَا وَلَدُهُ", 
            explanation: "Replace 'ـي' (my) with 'ـهُ' (his)." 
        },
        { 
            text: "8️⃣ How do you say 'This is his sister' in Arabic? (Start with: This is = هَذِهِ)",
            options: ["هَذِهِ أُخْتِي", "هَذِهِ أُخْتُهُ", "هَذِهِ أُخْتُهَا", "هَذِهِ أُخْتُكُمْ"], 
            correct: "هَذِهِ أُخْتُهُ", 
            explanation: "أُخْتُهُ (ukhtuhu) = his sister." 
        },
        { 
            text: "9️⃣ What is the correct form of 'This is his uncle Uthman' in Arabic?",
            options: ["هَذَا عَمِّي عُثْمَانُ", "هَذَا عَمُّهُ عُثْمَانُ", "هَذَا عَمُّكُمْ عُثْمَانُ", "هَذَا عَمُّنَا عُثْمَانُ"], 
            correct: "هَذَا عَمُّهُ عُثْمَانُ", 
            explanation: "عَمُّهُ (ʿammuhu) = his uncle." 
        },
        { 
            text: "🔟 How do you say 'This is his friend Ahmad' in Arabic?",
            options: ["هَذَا صَدِيقِي أَحْمَدُ", "هَذَا صَدِيقُهُ أَحْمَدُ", "هَذَا صَدِيقُكُمْ أَحْمَدُ", "هَذَا صَدِيقُنَا أَحْمَدُ"], 
            correct: "هَذَا صَدِيقُهُ أَحْمَدُ", 
            explanation: "صَدِيقُهُ (sadiiquhu) = his friend." 
        }
    ];
    const TOTAL_QS = QUESTIONS.length;

    let selectedAnswers = new Array(TOTAL_QS).fill(null);
    let questionLocked = new Array(TOTAL_QS).fill(false);
    let quizSubmitted = false;
    let timerInterval = null, beepInterval = null;
    let quizActive = false;
    let warningGiven = false;
    let timerStartTime = null;
    let timerRemaining = 5 * 60;

    const startOverlay = document.getElementById('startOverlay');
    const quizContent = document.getElementById('quizContent');
    const startBtn = document.getElementById('startQuizBtn');
    const studentNameInput = document.getElementById('studentNameInput');
    const addStudentBtn = document.getElementById('addStudentBtn');
    const exportBtn = document.getElementById('exportResultsBtn');
    const submitBtn = document.getElementById('submitQuizBtn');
    const activeDisplay = document.getElementById('activeStudentDisplay');
    const pauseBtn = document.getElementById('floatPauseBtn');
    const resumeBtn = document.getElementById('floatResumeBtn');
    const choiceModal = document.getElementById('choiceModal');
    const notificationModal = document.getElementById('notificationModal');
    const emailChoiceBtn = document.getElementById('emailChoiceBtn');
    const whatsappChoiceBtn = document.getElementById('whatsappChoiceBtn');
    const closeNotificationBtn = document.getElementById('closeNotificationBtn');
    const floatTimerDisplay = document.getElementById('floatTimerDisplay');

    let latestResults = null;

    function playHappySound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.5;
            osc1.frequency.value = 523.25;
            osc2.frequency.value = 659.25;
            osc1.start();
            osc2.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.6);
            osc1.stop(now + 0.5);
            osc2.stop(now + 0.5);
        } catch(e) {}
    }

    function playSadSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.5;
            osc.frequency.value = 440;
            osc.start();
            osc.frequency.exponentialRampToValueAtTime(220, now + 0.5);
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.6);
            osc.stop(now + 0.6);
        } catch(e) {}
    }

    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.35;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4);
            osc.stop(audioCtx.currentTime + 0.4);
        } catch(e) {}
    }

    function updateTimerDisplay() {
        const mins = Math.floor(timerRemaining / 60);
        const secs = timerRemaining % 60;
        const timeStr = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        floatTimerDisplay.innerText = timeStr;
    }

    function startContinuousBeeps() {
        if (beepInterval) clearInterval(beepInterval);
        beepInterval = setInterval(() => {
            if (timerRemaining <= 60 && timerRemaining > 0 && quizActive && !quizSubmitted) playBeep();
            else if (timerRemaining <= 0) clearInterval(beepInterval);
        }, 1500);
    }

    function initTimer() {
        timerStartTime = Date.now();
        timerRemaining = 5 * 60;
        updateTimerDisplay();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!quizActive || quizSubmitted) return;
            const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
            const newRemaining = Math.max(0, 5 * 60 - elapsed);
            if (newRemaining !== timerRemaining) {
                timerRemaining = newRemaining;
                updateTimerDisplay();
                if (timerRemaining <= 60 && !warningGiven && timerRemaining > 0) {
                    warningGiven = true;
                    showSimpleNotification("⚠️ Warning! Only 1 minute remaining! ⚠️");
                    playBeep();
                    startContinuousBeeps();
                }
                if (timerRemaining <= 0) {
                    clearInterval(timerInterval);
                    clearInterval(beepInterval);
                    updateTimerDisplay();
                    playBeep();
                    showSimpleNotification("⏰ Time is up! Submitting your quiz...");
                    setTimeout(() => submitQuizForce(), 1500);
                }
            }
        }, 200);
    }

    function pauseTimer() { quizActive = false; }
    function resumeTimer() { 
        if (timerRemaining > 0 && !quizSubmitted) {
            quizActive = true;
            const elapsed = 5 * 60 - timerRemaining;
            timerStartTime = Date.now() - elapsed * 1000;
        }
    }

    function showSimpleNotification(msg) {
        document.getElementById("notificationMessage").innerText = msg;
        notificationModal.style.display = "flex";
    }

    function computeResults() {
        let score = 0;
        let mistakes = [];
        for (let i = 0; i < TOTAL_QS; i++) {
            const q = QUESTIONS[i];
            const userAns = selectedAnswers[i];
            if (userAns && userAns.trim() === q.correct.trim()) {
                score++;
            } else {
                mistakes.push({
                    questionText: q.text,
                    userAnswer: userAns || "(unanswered)",
                    correctAnswer: q.correct
                });
            }
        }
        const percentage = Math.round(score / TOTAL_QS * 100);
        return { score, percentage, mistakes };
    }

    function buildMistakesMessage(studentName, score, percentage, mistakes) {
        let msg = `Student: ${studentName}\nCourse: ${COURSE_NAME}\nScore: ${score}/${TOTAL_QS} (${percentage}%)\nDate: ${new Date().toLocaleString()}\n\n`;
        if (mistakes.length === 0) {
            msg += `✅ No mistakes! Perfect score. 🎉\n`;
        } else {
            msg += `❌ Mistakes (${mistakes.length}):\n`;
            mistakes.forEach((m, idx) => {
                msg += `${idx+1}. ${m.questionText}\n   Your answer: ${m.userAnswer}\n   Correct: ${m.correctAnswer}\n\n`;
            });
        }
        return msg;
    }

    function saveAttemptLocally(name, score, percentage, mistakes) {
        let db = JSON.parse(localStorage.getItem("ArabicDialogueQuizDB")) || {};
        if (!db[name]) db[name] = { attempts: [] };
        db[name].attempts.unshift({ date: new Date().toLocaleString(), score, total: TOTAL_QS, percentage, mistakesCount: mistakes.length });
        localStorage.setItem("ArabicDialogueQuizDB", JSON.stringify(db));
    }

    function emailResults(studentName, score, percentage, mistakes) {
        const body = buildMistakesMessage(studentName, score, percentage, mistakes);
        const subject = `Arabic Quiz Results – ${studentName} – ${score}/${TOTAL_QS} (${percentage}%)`;
        window.location.href = `mailto:${TEACHER_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    function whatsappResults(studentName, score, percentage, mistakes) {
        const body = buildMistakesMessage(studentName, score, percentage, mistakes);
        const url = `https://wa.me/${TEACHER_WHATSAPP}?text=${encodeURIComponent(body)}`;
        window.open(url, '_blank');
    }

    function finalizeQuiz(studentName) {
        if (quizSubmitted) return;
        quizSubmitted = true;
        quizActive = false;
        clearInterval(timerInterval);
        clearInterval(beepInterval);
        const { score, percentage, mistakes } = computeResults();
        saveAttemptLocally(studentName, score, percentage, mistakes);
        document.getElementById("scorePreview").innerHTML = `📊 Score: ${score}/${TOTAL_QS} (${percentage}%)`;
        latestResults = { studentName, score, percentage, mistakes };
        document.querySelectorAll('input, textarea').forEach(el => el.disabled = true);
        submitBtn.disabled = true;
        pauseBtn.disabled = true;
        resumeBtn.disabled = true;
        
        // Show share modal directly (no certificate)
        choiceModal.style.display = "flex";
    }

    function submitQuizForce() {
        if (quizSubmitted) return;
        const studentName = studentNameInput.value.trim();
        if (!studentName) { showSimpleNotification("Please enter your name."); return; }
        finalizeQuiz(studentName);
    }

    function onSubmit() {
        if (quizSubmitted) { showSimpleNotification("Quiz already submitted."); return; }
        const studentName = studentNameInput.value.trim();
        if (!studentName) { showSimpleNotification("Please enter your name!"); return; }
        let unanswered = selectedAnswers.some(a => a === null);
        if (unanswered && !confirm("You have unanswered questions. Submit anyway?")) return;
        finalizeQuiz(studentName);
    }

    function handleEmail() {
        if (latestResults) emailResults(latestResults.studentName, latestResults.score, latestResults.percentage, latestResults.mistakes);
        choiceModal.style.display = "none";
        showSimpleNotification("📧 Email client opened. Please send.");
    }
    function handleWhatsApp() {
        if (latestResults) whatsappResults(latestResults.studentName, latestResults.score, latestResults.percentage, latestResults.mistakes);
        choiceModal.style.display = "none";
        showSimpleNotification("💬 WhatsApp opened. Send the message.");
    }

    function checkAndGiveFeedback(idx, val) {
        const q = QUESTIONS[idx];
        const isCorrect = val && val.trim() === q.correct.trim();
        const card = document.querySelector(`.question-card[data-qidx='${idx}']`);
        if (card) {
            let fb = card.querySelector(".feedback-inline");
            if (!fb) { fb = document.createElement("div"); fb.className = "feedback-inline"; card.appendChild(fb); }
            fb.className = "feedback-inline show";
            fb.innerHTML = isCorrect ? `✅ Correct! ${q.explanation}` : `❌ Wrong! Correct answer: ${q.correct}. ${q.explanation}`;
            if (isCorrect) playHappySound();
            else playSadSound();
        }
        if (!questionLocked[idx]) {
            questionLocked[idx] = true;
            const cardDiv = document.querySelector(`.question-card[data-qidx='${idx}']`);
            if (cardDiv) {
                cardDiv.querySelectorAll('input').forEach(inp => inp.disabled = true);
                cardDiv.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
            }
        }
    }

    function renderQuestions() {
        const grid = document.getElementById("questionsGrid");
        grid.innerHTML = "";
        QUESTIONS.forEach((q, idx) => {
            const card = document.createElement("div");
            card.className = "question-card";
            card.setAttribute("data-qidx", idx);
            let innerHtml = `<div class="question-text">${q.text}</div><div class="options">`;
            q.options.forEach(opt => {
                innerHtml += `<div class="option"><input type="radio" name="q${idx}" value="${escapeHtml(opt)}" id="q${idx}_${opt.replace(/[^a-z0-9]/gi,'')}"><label>${escapeHtml(opt)}</label></div>`;
            });
            innerHtml += `</div><div class="feedback-inline"></div>`;
            card.innerHTML = innerHtml;
            grid.appendChild(card);
        });
        for (let i = 0; i < TOTAL_QS; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (quizSubmitted) return;
                    if (questionLocked[i]) return;
                    if (radio.checked) {
                        selectedAnswers[i] = radio.value;
                        checkAndGiveFeedback(i, radio.value);
                    }
                });
            });
            if (selectedAnswers[i]) {
                const chk = document.querySelector(`input[name="q${i}"][value="${escapeHtml(selectedAnswers[i])}"]`);
                if (chk) { chk.checked = true; checkAndGiveFeedback(i, selectedAnswers[i]); }
            }
        }
        attachOptionClickHandlers();
    }

    function attachOptionClickHandlers() {
        document.querySelectorAll('.option').forEach(opt => {
            const radio = opt.querySelector('input[type="radio"]');
            if (radio && !opt.classList.contains('disabled')) {
                opt.removeEventListener('click', opt._clickHandler);
                const handler = (e) => {
                    if (radio.disabled) return;
                    if (e.target.tagName !== 'INPUT') {
                        radio.checked = true;
                        radio.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                };
                opt._clickHandler = handler;
                opt.addEventListener('click', handler);
            }
        });
    }

    function escapeHtml(s) { if(!s) return ""; return s.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }

    function addStudent() { const n = prompt("New student name:"); if(n && n.trim()) { studentNameInput.value = n.trim(); localStorage.setItem("lastStudent", n.trim()); activeDisplay.innerText = n.trim(); } }
    function exportCSV() {
        let db = JSON.parse(localStorage.getItem("ArabicDialogueQuizDB")) || {};
        let rows = [["Student","Date","Score","Total","%","Mistakes"]];
        for (let [s,d] of Object.entries(db)) for (let a of d.attempts) rows.push([`"${s}"`,`"${a.date}"`,a.score,a.total,a.percentage,a.mistakesCount]);
        if (rows.length===1) { showSimpleNotification("No data to export."); return; }
        let csv = rows.map(r=>r.join(",")).join("\n");
        let blob = new Blob(["\uFEFF"+csv], {type:"text/csv"});
        let a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="arabic_quiz_results.csv"; a.click(); URL.revokeObjectURL(a.href);
    }

    function startQuiz() {
        const studentName = studentNameInput.value.trim();
        if (!studentName) { showSimpleNotification("Please enter your name before starting."); return; }
        activeDisplay.innerText = studentName;
        localStorage.setItem("lastStudent", studentName);
        startOverlay.style.display = "none";
        quizContent.style.display = "block";
        renderQuestions();
        initTimer();
        quizActive = true;
        pauseBtn.disabled = false;
        resumeBtn.disabled = false;
    }

    startBtn.addEventListener('click', startQuiz);
    addStudentBtn.addEventListener('click', addStudent);
    exportBtn.addEventListener('click', exportCSV);
    submitBtn.addEventListener('click', onSubmit);
    pauseBtn.addEventListener('click', pauseTimer);
    resumeBtn.addEventListener('click', resumeTimer);
    emailChoiceBtn.addEventListener('click', handleEmail);
    whatsappChoiceBtn.addEventListener('click', handleWhatsApp);
    closeNotificationBtn.addEventListener('click', () => notificationModal.style.display = "none");

    let saved = localStorage.getItem("lastStudent");
    if (saved) { studentNameInput.value = saved; activeDisplay.innerText = saved; }
    else { studentNameInput.value = ""; activeDisplay.innerText = "(none)"; }
    window.scrollTo(0, 0);
</script>
</body>
</html>
