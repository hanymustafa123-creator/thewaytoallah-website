<script>
    // ==================== CONFIGURATION ====================
    const TEACHER_EMAIL = "hanishahin123@outlook.com";

    // =======================================================

    // Sound functions
    function playHappySound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.5;
            osc1.frequency.value = 523.25;
            osc2.frequency.value = 659.25;
            osc1.start();
            osc2.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.6);
            osc1.stop(now + 0.5);
            osc2.stop(now + 0.5);
        } catch(e) {}
    }

    function playSadSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.5;
            osc.frequency.value = 440;
            osc.start();
            osc.frequency.exponentialRampToValueAtTime(220, now + 0.5);
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.6);
            osc.stop(now + 0.6);
        } catch(e) {}
    }

    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.35;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4);
            osc.stop(audioCtx.currentTime + 0.4);
        } catch(e) {}
    }

    // 20 questions covering the whole Surah Al-Fath (48:1-29)
    const QUESTIONS = [
        // ========== STOPPING RULES (WAQF) – 10 questions ==========
        { text: "Surah Al-Fath (48:1): إِنَّا فَتَحْنَا لَكَ فَتْحًا مُّبِينًا. When you stop on the word 'مُّبِينًا', how do you pronounce the last letter?", type: "mcq", options: ["With tanween clearly", "With a sukoon (drop tanween, add alif)", "With a kasra", "With a damma"], correct: "With a sukoon (drop tanween, add alif)", explanation: "Tanween fat-h is dropped and you add an alif with sukoon when stopping." },
        { text: "Surah Al-Fath (48:2): لِّيَغْفِرَ لَكَ اللَّهُ مَا تَقَدَّمَ مِن ذَنۢبِكَ. The word 'ذَنۢبِكَ' ends with a kasra on the letter ك. When stopping, you say:", type: "mcq", options: ["ذَنۢبِكِ", "ذَنۢبِكَ", "ذَنۢبِكْ", "ذَنۢبِكَا"], correct: "ذَنۢبِكْ", explanation: "The last letter becomes saakin (sukoon) when stopping." },
        { text: "Surah Al-Fath (48:5): لِّيُدْخِلَ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ. The word 'الْأَنْهَارُ' ends with damma on ر. When you stop, it becomes:", type: "mcq", options: ["الْأَنْهَارُ", "الْأَنْهَارِ", "الْأَنْهَارْ", "الْأَنْهَارَا"], correct: "الْأَنْهَارْ", explanation: "The damma is replaced by sukoon when stopping." },
        { text: "Surah Al-Fath (48:10): إِنَّ الَّذِينَ يُبَايِعُونَكَ إِنَّمَا يُبَايِعُونَ اللَّهَ. The word 'اللَّهَ' ends with a fatha on ه. When stopping, you say:", type: "mcq", options: ["اللَّهَ", "اللَّهِ", "اللَّهْ", "اللَّهَا"], correct: "اللَّهْ", explanation: "Stop with sukoon on the final ه." },
        { text: "Surah Al-Fath (48:29): مُّحَمَّدٌ رَّسُولُ اللَّهِ. The word 'اللَّهِ' ends with a kasra on ه. When stopping, you pronounce:", type: "mcq", options: ["اللَّهِ", "اللَّهْ", "اللَّهُ", "اللَّهَا"], correct: "اللَّهْ", explanation: "Kasra becomes sukoon when stopping." },
        { text: "Surah Al-Fath (48:3): وَيَنصُرَكَ اللَّهُ نَصْرًا عَزِيزًا. The word 'عَزِيزًا' ends with tanween fat-h. When stopping, you say:", type: "mcq", options: ["عَزِيزًا", "عَزِيزَ", "عَزِيزْ", "عَزِيزَا"], correct: "عَزِيزَا", explanation: "Tanween fat-h becomes a long alif with sukoon." },
        { text: "Surah Al-Fath (48:8): إِنَّا أَرْسَلْنَاكَ شَاهِدًا وَمُبَشِّرًا وَنَذِيرًا. The word 'نَذِيرًا' when stopping becomes:", type: "mcq", options: ["نَذِيرًا", "نَذِيرَ", "نَذِيرْ", "نَذِيرَا"], correct: "نَذِيرَا", explanation: "Tanween fat-h is replaced by alif with sukoon." },
        { text: "Surah Al-Fath (48:18): لَّقَدْ رَضِيَ اللَّهُ عَنِ الْمُؤْمِنِينَ. The word 'الْمُؤْمِنِينَ' ends with kasra on ن. Stopping gives:", type: "mcq", options: ["الْمُؤْمِنِينَ", "الْمُؤْمِنِينْ", "الْمُؤْمِنِينِ", "الْمُؤْمِنِينَا"], correct: "الْمُؤْمِنِينْ", explanation: "Kasra becomes sukoon when stopping." },
        { text: "Surah Al-Fath (48:24): وَهُوَ الَّذِي كَفَّ أَيْدِيَهُمْ عَنكُمْ. The word 'عَنكُمْ' ends with damma on م. When stopping:", type: "mcq", options: ["عَنكُمْ", "عَنكُمِ", "عَنكْمْ", "عَنكُمَا"], correct: "عَنكْمْ", explanation: "Damma changes to sukoon." },
        { text: "Surah Al-Fath (48:29): كَزَرْعٍ أَخْرَجَ شَطْأَهُ. The word 'شَطْأَهُ' ends with haa (ه) with damma. Stop on it:", type: "mcq", options: ["شَطْأَهُ", "شَطْأَهْ", "شَطْأَهِ", "شَطْأَهَا"], correct: "شَطْأَهْ", explanation: "Final haa takes sukoon when stopping." },
        // ========== GHUNNAH (NOON & MEEM MUSHADDADAH) – 10 questions ==========
        { text: "Surah Al-Fath (48:5): خَالِدِينَ فِيهَا. Does the word 'فِيهَا' contain a noon or meem with shaddah requiring ghunnah?", type: "mcq", options: ["Yes, on ي", "Yes, on ه", "No", "Yes, on ف"], correct: "No", explanation: "Ghunnah only applies to نّ or مّ. There is no shaddah here." },
        { text: "Surah Al-Fath (48:10): إِنَّ الَّذِينَ يُبَايِعُونَكَ. The word 'إِنَّ' contains a noon with shaddah (نَّ). How long do you hold the ghunnah?", type: "mcq", options: ["1 count", "2 counts", "3 counts", "4 counts"], correct: "2 counts", explanation: "Noon and meem mushaddadah have ghunnah of 2 harakah." },
        { text: "Surah Al-Fath (48:11): سَيَقُولُ لَكَ الْمُخَلَّفُونَ. The word 'الْمُخَلَّفُونَ' has a meem with shaddah (مَّ). This requires:", type: "mcq", options: ["No ghunnah", "Ghunnah of 2 counts", "Idghaam", "Ikhfaa"], correct: "No ghunnah", explanation: "As per your teacher's instruction, the correct answer is No ghunnah for this specific word." },
        { text: "Surah Al-Fath (48:16): سَتُدْعَوْنَ إِلَىٰ قَوْمٍ أُولِي بَأْسٍ شَدِيدٍ. Does this ayah contain any noon or meem with shaddah?", type: "mcq", options: ["Yes, on د", "Yes, on ش", "No shaddah at all", "Yes, on ب"], correct: "No shaddah at all", explanation: "There is no shaddah on any letter in this ayah. Correct." },
        { text: "Surah Al-Fath (48:18): لَّقَدْ رَضِيَ اللَّهُ عَنِ الْمُؤْمِنِينَ إِذْ يُبَايِعُونَكَ تَحْتَ الشَّجَرَةِ. The word 'الشَّجَرَةِ' has a shaddah on which letter?", type: "mcq", options: ["ش (sheen)", "ج (jeem)", "ر (ra)", "No shaddah"], correct: "ش (sheen)", explanation: "الشَّجَرَةِ has shaddah on ش, not noon/meem." },
        { text: "Surah Al-Fath (48:24): وَهُوَ الَّذِي كَفَّ أَيْدِيَهُمْ عَنكُمْ. The word 'كَفَّ' has a shaddah on ف. Does this require ghunnah?", type: "mcq", options: ["Yes, 2 counts", "Yes, 1 count", "No", "Yes, 4 counts"], correct: "No", explanation: "Ghunnah is only for ن and م with shaddah." },
        { text: "Surah Al-Fath (48:26): إِذْ جَعَلَ الَّذِينَ كَفَرُوا فِي قُلُوبِهِمُ الْحَمِيَّةَ حَمِيَّةَ الْجَاهِلِيَّةِ. The word 'الْحَمِيَّةَ' has a shaddah on ي. Is there ghunnah?", type: "mcq", options: ["Yes", "No"], correct: "No", explanation: "Shaddah on ي does not produce ghunnah; only نّ and مّ." },
        { text: "Surah Al-Fath (48:29): مُّحَمَّدٌ رَّسُولُ اللَّهِ. The word 'مُّحَمَّدٌ' begins with meem shaddah (مّ). How is it pronounced?", type: "mcq", options: ["With ghunnah of 2 counts", "With no ghunnah", "With idghaam", "With ikhfa"], correct: "With ghunnah of 2 counts", explanation: "Any meem with shaddah has ghunnah of 2 counts." },
        { text: "Surah Al-Fath (48:2): لِّيَغْفِرَ لَكَ اللَّهُ مَا تَقَدَّمَ مِن ذَنۢبِكَ. The word 'ذَنۢبِكَ' has a noon with a small meem (ۢ). Does this count as noon mushaddadah?", type: "mcq", options: ["Yes, it requires ghunnah", "No, it is iqlaab", "Yes, but only 1 count", "No ghunnah"], correct: "No, it is iqlaab", explanation: "The small meem above noon indicates iqlaab (turning into meem), not shaddah." },
        { text: "Surah Al-Fath (48:5): لِّيُدْخِلَ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ. The word 'الْمُؤْمِنِينَ' has a noon with kasra. Does it have ghunnah?", type: "mcq", options: ["Yes, always", "No, only if it has shaddah", "Yes, 2 counts", "Only if stopping"], correct: "No, only if it has shaddah", explanation: "Ghunnah for noon/meem mushaddadah requires a shaddah. Regular noon has no ghunnah." }
    ];
    const TOTAL_QS = QUESTIONS.length;

    let selectedAnswers = new Array(TOTAL_QS).fill(null);
    let questionLocked = new Array(TOTAL_QS).fill(false);
    let quizSubmitted = false;
    let timerInterval = null, beepInterval = null;
    let quizActive = false;
    let warningGiven = false;
    let timerStartTime = null;
    let timerRemaining = 5 * 60; // 5 minutes

    // DOM elements
    const startOverlay = document.getElementById('startOverlay');
    const quizContent = document.getElementById('quizContent');
    const startBtn = document.getElementById('startQuizBtn');
    const studentNameInput = document.getElementById('studentNameInput');
    const addStudentBtn = document.getElementById('addStudentBtn');
    const exportBtn = document.getElementById('exportResultsBtn');
    const submitBtn = document.getElementById('submitQuizBtn');
    const activeDisplay = document.getElementById('activeStudentDisplay');
    const pauseBtn = document.getElementById('pauseTimerBtn');
    const resumeBtn = document.getElementById('resumeTimerBtn');
    const choiceModal = document.getElementById('choiceModal');
    const notificationModal = document.getElementById('notificationModal');
    const emailChoiceBtn = document.getElementById('emailChoiceBtn');
    const whatsappChoiceBtn = document.getElementById('whatsappChoiceBtn');
    const closeNotificationBtn = document.getElementById('closeNotificationBtn');

    let latestResults = null;

    // Timer functions
    function initTimer() {
        timerStartTime = Date.now();
        timerRemaining = 5 * 60;
        updateTimerDisplay();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!quizActive || quizSubmitted) return;
            const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
            const newRemaining = Math.max(0, 5 * 60 - elapsed);
            if (newRemaining !== timerRemaining) {
                timerRemaining = newRemaining;
                updateTimerDisplay();
                if (timerRemaining <= 60 && !warningGiven && timerRemaining > 0) {
                    warningGiven = true;
                    showSimpleNotification("⚠️ Warning! Only 1 minute remaining! ⚠️");
                    playBeep();
                    startContinuousBeeps();
                }
                if (timerRemaining <= 0) {
                    clearInterval(timerInterval);
                    clearInterval(beepInterval);
                    document.getElementById("timerDisplay").innerText = "00:00";
                    playBeep();
                    showSimpleNotification("⏰ Time is up! Submitting your quiz...");
                    setTimeout(() => submitQuizForce(), 1500);
                }
            }
        }, 200);
    }
    function updateTimerDisplay() {
        const mins = Math.floor(timerRemaining / 60);
        const secs = timerRemaining % 60;
        document.getElementById("timerDisplay").innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }
    function startContinuousBeeps() {
        if (beepInterval) clearInterval(beepInterval);
        beepInterval = setInterval(() => {
            if (timerRemaining <= 60 && timerRemaining > 0 && quizActive && !quizSubmitted) playBeep();
            else if (timerRemaining <= 0) clearInterval(beepInterval);
        }, 1500);
    }
    function pauseTimer() { quizActive = false; }
    function resumeTimer() { 
        if (timerRemaining > 0 && !quizSubmitted) {
            quizActive = true;
            const elapsed = 5 * 60 - timerRemaining;
            timerStartTime = Date.now() - elapsed * 1000;
        }
    }
    function showSimpleNotification(msg) {
        document.getElementById("notificationMessage").innerText = msg;
        notificationModal.style.display = "flex";
    }

    // Core results
    function computeResults() {
        let score = 0;
        let mistakes = [];
        for (let i = 0; i < TOTAL_QS; i++) {
            const q = QUESTIONS[i];
            const userAns = selectedAnswers[i];
            const isCorrect = (userAns && userAns.trim() === q.correct.trim());
            if (isCorrect) score++;
            else {
                mistakes.push({
                    questionText: q.text,
                    userAnswer: userAns || "(unanswered)",
                    correctAnswer: q.correct
                });
            }
        }
        const percentage = Math.round(score / TOTAL_QS * 100);
        return { score, percentage, mistakes };
    }

    function buildMistakesMessage(studentName, score, percentage, mistakes) {
        let msg = `Student: ${studentName}\nCourse: ${COURSE_NAME}\nScore: ${score}/${TOTAL_QS} (${percentage}%)\nDate: ${new Date().toLocaleString()}\n\n`;
        if (mistakes.length === 0) {
            msg += `✅ No mistakes! Perfect score. 🎉\n`;
        } else {
            msg += `❌ Mistakes (${mistakes.length}):\n`;
            mistakes.forEach((m, idx) => {
                msg += `${idx+1}. ${m.questionText}\n   Your answer: ${m.userAnswer}\n   Correct: ${m.correctAnswer}\n\n`;
            });
        }
        return msg;
    }

    function saveAttemptLocally(name, score, percentage, mistakes) {
        let db = JSON.parse(localStorage.getItem("TajweedDB_Fath_Full")) || {};
        if (!db[name]) db[name] = { attempts: [] };
        db[name].attempts.unshift({ date: new Date().toLocaleString(), score, total: TOTAL_QS, percentage, mistakesCount: mistakes.length });
        localStorage.setItem("TajweedDB_Fath_Full", JSON.stringify(db));
    }

    function emailResults(studentName, score, percentage, mistakes) {
        const body = buildMistakesMessage(studentName, score, percentage, mistakes);
        const subject = `Quiz Results – ${studentName} – ${score}/${TOTAL_QS} (${percentage}%)`;
        window.location.href = `mailto:${TEACHER_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    function whatsappResults(studentName, score, percentage, mistakes) {
        const body = buildMistakesMessage(studentName, score, percentage, mistakes);
        const url = `https://wa.me/${TEACHER_WHATSAPP}?text=${encodeURIComponent(body)}`;
        window.open(url, '_blank');
    }

    function finalizeQuiz(studentName) {
        if (quizSubmitted) return;
        quizSubmitted = true;
        quizActive = false;
        clearInterval(timerInterval);
        clearInterval(beepInterval);
        const { score, percentage, mistakes } = computeResults();
        saveAttemptLocally(studentName, score, percentage, mistakes);
        document.getElementById("scorePreview").innerHTML = `📊 Score: ${score}/${TOTAL_QS} (${percentage}%)`;
        latestResults = { studentName, score, percentage, mistakes };
        document.querySelectorAll('input, textarea').forEach(el => el.disabled = true);
        submitBtn.disabled = true;
        pauseBtn.disabled = true;
        resumeBtn.disabled = true;
        choiceModal.style.display = "flex";
    }

    function submitQuizForce() {
        if (quizSubmitted) return;
        const studentName = studentNameInput.value.trim();
        if (!studentName) { showSimpleNotification("Please enter your name."); return; }
        finalizeQuiz(studentName);
    }
    function onSubmit() {
        if (quizSubmitted) { showSimpleNotification("Quiz already submitted."); return; }
        const studentName = studentNameInput.value.trim();
        if (!studentName) { showSimpleNotification("Please enter your name!"); return; }
        let unanswered = selectedAnswers.some(a => a === null);
        if (unanswered && !confirm("You have unanswered questions. Submit anyway?")) return;
        finalizeQuiz(studentName);
    }

    function handleEmail() {
        if (latestResults) emailResults(latestResults.studentName, latestResults.score, latestResults.percentage, latestResults.mistakes);
        choiceModal.style.display = "none";
        showSimpleNotification("📧 Email client opened. Please send.");
    }
    function handleWhatsApp() {
        if (latestResults) whatsappResults(latestResults.studentName, latestResults.score, latestResults.percentage, latestResults.mistakes);
        choiceModal.style.display = "none";
        showSimpleNotification("💬 WhatsApp opened. Send the message.");
    }

    // Render questions
    function renderQuestions() {
        const grid = document.getElementById("questionsGrid");
        grid.innerHTML = "";
        QUESTIONS.forEach((q, idx) => {
            const card = document.createElement("div");
            card.className = "question-card";
            card.setAttribute("data-qidx", idx);
            let innerHtml = `<div class="question-text">${idx+1}. ${q.text}</div><div class="options">`;
            q.options.forEach(opt => {
                innerHtml += `<div class="option"><input type="radio" name="q${idx}" value="${escapeHtml(opt)}" id="q${idx}_${opt.replace(/[^a-z]/gi,'')}"><label>${escapeHtml(opt)}</label></div>`;
            });
            innerHtml += `</div><div class="feedback-inline"></div>`;
            card.innerHTML = innerHtml;
            grid.appendChild(card);
        });
        for (let i = 0; i < TOTAL_QS; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (quizSubmitted) return;
                    if (questionLocked[i]) return;
                    if (radio.checked) {
                        selectedAnswers[i] = radio.value;
                        checkAndGiveFeedback(i, radio.value);
                    }
                });
            });
            if (selectedAnswers[i]) {
                const chk = document.querySelector(`input[name="q${i}"][value="${escapeHtml(selectedAnswers[i])}"]`);
                if (chk) { chk.checked = true; checkAndGiveFeedback(i, selectedAnswers[i]); }
            }
        }
        attachOptionClickHandlers();
    }

    function checkAndGiveFeedback(idx, val) {
        const q = QUESTIONS[idx];
        const isCorrect = val && val.trim() === q.correct.trim();
        const card = document.querySelector(`.question-card[data-qidx='${idx}']`);
        if (card) {
            let fb = card.querySelector(".feedback-inline");
            if (!fb) { fb = document.createElement("div"); fb.className = "feedback-inline"; card.appendChild(fb); }
            fb.className = "feedback-inline show";
            fb.innerHTML = isCorrect ? `✅ Correct! ${q.explanation}` : `❌ Wrong! Correct answer: ${q.correct}. ${q.explanation}`;
            if (isCorrect) playHappySound();
            else playSadSound();
        }
        lockQuestion(idx);
    }

    function lockQuestion(idx) {
        if (questionLocked[idx]) return;
        questionLocked[idx] = true;
        const card = document.querySelector(`.question-card[data-qidx='${idx}']`);
        if (card) {
            card.querySelectorAll('input').forEach(inp => inp.disabled = true);
            card.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
        }
    }

    function attachOptionClickHandlers() {
        document.querySelectorAll('.option').forEach(opt => {
            const radio = opt.querySelector('input[type="radio"]');
            if (radio && !opt.classList.contains('disabled')) {
                opt.removeEventListener('click', opt._clickHandler);
                const handler = (e) => {
                    if (radio.disabled) return;
                    if (e.target.tagName !== 'INPUT') {
                        radio.checked = true;
                        radio.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                };
                opt._clickHandler = handler;
                opt.addEventListener('click', handler);
            }
        });
    }
    function escapeHtml(s) { if(!s) return ""; return s.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }

    function addStudent() { const n = prompt("New student name:"); if(n && n.trim()) { studentNameInput.value = n.trim(); localStorage.setItem("lastStudentFathFull", n.trim()); activeDisplay.innerText = n.trim(); } }
    function exportCSV() {
        let db = JSON.parse(localStorage.getItem("TajweedDB_Fath_Full")) || {};
        let rows = [["Student","Date","Score","Total","%","Mistakes"]];
        for (let [s,d] of Object.entries(db)) for (let a of d.attempts) rows.push([`"${s}"`,`"${a.date}"`,a.score,a.total,a.percentage,a.mistakesCount]);
        if (rows.length===1) { showSimpleNotification("No data to export."); return; }
        let csv = rows.map(r=>r.join(",")).join("\n");
        let blob = new Blob(["\uFEFF"+csv], {type:"text/csv"});
        let a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="tajweed_fath_full_results.csv"; a.click(); URL.revokeObjectURL(a.href);
    }

    function startQuiz() {
        const studentName = studentNameInput.value.trim();
        if (!studentName) { showSimpleNotification("Please enter your name before starting."); return; }
        activeDisplay.innerText = studentName;
        localStorage.setItem("lastStudentFathFull", studentName);
        startOverlay.style.display = "none";
        quizContent.style.display = "block";
        renderQuestions();
        initTimer();
        quizActive = true;
        pauseBtn.disabled = false;
        resumeBtn.disabled = false;
    }

    startBtn.addEventListener('click', startQuiz);
    addStudentBtn.addEventListener('click', addStudent);
    exportBtn.addEventListener('click', exportCSV);
    submitBtn.addEventListener('click', onSubmit);
    pauseBtn.addEventListener('click', pauseTimer);
    resumeBtn.addEventListener('click', resumeTimer);
    emailChoiceBtn.addEventListener('click', handleEmail);
    whatsappChoiceBtn.addEventListener('click', handleWhatsApp);
    closeNotificationBtn.addEventListener('click', () => notificationModal.style.display = "none");

    let saved = localStorage.getItem("lastStudentFathFull");
    if (saved) { studentNameInput.value = saved; activeDisplay.innerText = saved; }
    window.scrollTo(0, 0);
</script>
</body>
</html>
